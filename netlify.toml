[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/register"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/tools/detect-tech"
  to = "/.netlify/functions/detect-tech"
  status = 200

[[redirects]]
  from = "/api/scan"
  to = "/.netlify/functions/scan"
  status = 200

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200